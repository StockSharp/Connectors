// Protocol subset derived from the official longbridge/openapi-protobufs repository.
syntax = "proto3";

package longbridge.trade.v1;
option csharp_namespace = "StockSharp.Longbridge.Native.Protos.Trade";

enum Command {
  CMD_UNKNOWN = 0;
  CMD_SUB = 16;
  CMD_UNSUB = 17;
  CMD_NOTIFY = 18;
}

message Sub {
  repeated string topics = 1;
}

message SubResponse {
  message Fail {
    string topic = 1;
    string reason = 2;
  }
  repeated string success = 1;
  repeated Fail fail = 2;
  repeated string current = 3;
}

message Unsub {
  repeated string topics = 1;
}

message UnsubResponse {
  repeated string current = 3;
}

enum DispatchType {
  DISPATCH_UNDEFINED = 0;
  DISPATCH_DIRECT = 1;
  DISPATCH_BROADCAST = 2;
}

enum ContentType {
  CONTENT_UNDEFINED = 0;
  CONTENT_JSON = 1;
  CONTENT_PROTO = 2;
}

message Notification {
  string topic = 1;
  ContentType content_type = 2;
  DispatchType dispatch_type = 3;
  bytes data = 4;
}
