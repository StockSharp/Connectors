// Protocol subset derived from the official longbridge/openapi-protobufs repository.
syntax = "proto3";

package longbridge.control.v1;
option csharp_namespace = "StockSharp.Longbridge.Native.Protos.Control";

enum Command {
  CMD_CLOSE = 0;
  CMD_HEARTBEAT = 1;
  CMD_AUTH = 2;
  CMD_RECONNECT = 3;
}

message Close {
  enum Code {
    HeartbeatTimeout = 0;
    ServerError = 1;
    ServerShutdown = 2;
    UnpackError = 3;
    AuthError = 4;
    SessExpired = 5;
    ConnectDuplicate = 6;
  }
  Code code = 1;
  string reason = 2;
}

message Heartbeat {
  int64 timestamp = 1;
  optional int32 heartbeat_id = 2;
}

message AuthRequest {
  string token = 1;
  map<string, string> metadata = 2;
}

message AuthResponse {
  string session_id = 1;
  int64 expires = 2;
  uint32 limit = 3;
  uint32 online = 4;
}

message Error {
  uint64 code = 1;
  string msg = 2;
}
