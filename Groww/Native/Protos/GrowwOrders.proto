syntax = "proto3";

option csharp_namespace = "StockSharp.Groww.Native.Protobuf.Orders";

enum GrowwOrderStatusProto {
  NEW = 0;
  ACKED = 1;
  TRIGGER_PENDING = 2;
  APPROVED = 3;
  REJECTED = 4;
  FAILED = 5;
  EXECUTED = 6;
  DELIVERY_AWAITED = 7;
  CANCELLED = 8;
  CANCELLATION_REQUESTED = 9;
  MODIFICATION_REQUESTED = 10;
  COMPLETED = 11;
}

enum GrowwOrderDurationProto {
  IOC = 0;
  DAY = 1;
  GTD = 2;
  GTC = 3;
  EOS = 4;
}

enum GrowwOrderExchangeProto {
  BSE = 0;
  NSE = 1;
  MCX = 2;
  MCXSX = 3;
  NCDEX = 4;
  US = 5;
}

enum GrowwOrderSegmentProto {
  CASH = 0;
  FNO = 1;
  CURRENCY = 2;
  COMMODITY = 3;
}

enum GrowwOrderProductProto {
  CNC = 0;
  MIS = 1;
  CO = 2;
  BO = 3;
  NRML = 4;
  ARB = 5;
  MTF = 6;
}

enum GrowwOrderTypeProto {
  MKT = 0;
  L = 1;
  SL = 2;
  SL_M = 3;
}

enum GrowwBuySellProto {
  B = 0;
  S = 1;
}

message StageAndTimeStamp {
  double timeStampFromMidNight = 1;
  string stageName = 2;
}

message OrderDetailsBroadCastDto {
  repeated StageAndTimeStamp stageAndTimeStamp = 1;
  OrderDetailUpdateDto orderDetailUpdateDto = 2;
}

message OrderDetailUpdateDto {
  int32 qty = 1;
  int64 price = 2;
  int64 triggerPrice = 3;
  int32 filledQty = 4;
  int32 remainingQty = 5;
  int64 avgFillPrice = 6;
  string growwOrderId = 7;
  string exchangeOrderId = 8;
  GrowwOrderStatusProto orderStatus = 9;
  GrowwOrderDurationProto duration = 10;
  GrowwOrderExchangeProto exchange = 11;
  GrowwOrderSegmentProto segment = 12;
  GrowwOrderProductProto product = 13;
  GrowwOrderTypeProto orderType = 14;
  GrowwBuySellProto buySell = 15;
  string remark = 16;
  string contractId = 22;
  string guiOrderId = 23;
}
