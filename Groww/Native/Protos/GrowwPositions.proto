syntax = "proto3";

package groww.protobuf.fno.dto.fnoData;
option csharp_namespace = "StockSharp.Groww.Native.Protobuf.Positions";

enum GrowwPositionProductProto {
  CNC = 0;
  MIS = 1;
  CO = 2;
  BO = 3;
  NRML = 4;
  ARB = 5;
  MTF = 6;
  UNKNOWN = 7;
}

enum GrowwEquityTypeProto {
  STOCKS = 0;
  FUTURE = 1;
  OPTION = 2;
  ETF = 3;
  INDEX = 4;
  BONDS = 5;
}

enum GrowwEquityAssetProto {
  EQUITY_ASSET_STOCKS = 0;
  EQUITY_ASSET_INDICES = 1;
}

enum GrowwPositionExchangeProto {
  BSE = 0;
  NSE = 1;
  MCX = 2;
  MCXSX = 3;
  NCDEX = 4;
  GLOBAL = 5;
  US = 6;
}

message PositionDetailProto {
  SymbolInfoProto symbolData = 1;
  PositionInfoProto positionInfo = 2;
}

message SymbolInfoProto {
  int64 trTimeStamp = 1;
  string searchId = 2;
  GrowwPositionProductProto stocksProduct = 3;
  string contractId = 4;
  GrowwEquityTypeProto equityType = 5;
  string displayName = 6;
  string underlyingId = 7;
  int64 nseMarketLot = 8;
  int64 bseMarketLot = 9;
  GrowwEquityAssetProto underlyingAssetType = 10;
  int64 freezeQty = 11;
  GrowwPositionExchangeProto exchange = 12;
}

message PositionInfoProto {
  string symbolIsin = 1;
  GrowwExchangePositionProto BSE = 2;
  GrowwExchangePositionProto NSE = 3;
}

message GrowwExchangePositionProto {
  double creditQty = 1;
  double creditPrice = 2;
  double debitQty = 3;
  double debitPrice = 4;
}
