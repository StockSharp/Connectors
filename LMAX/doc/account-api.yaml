          description: Stop offset from contingent order reference price; required
            when setting a stop loss contingent order
        stop_loss_instruction_id:
          maxLength: 20
          type: string
          description: "An identifier for this request's stop loss order. Use ASCII\
            \ characters from 33 to 126. Cannot be \"0\"; required when setting a\
