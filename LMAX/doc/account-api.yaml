  /v1/account/withdrawals:
    get:
      tags:
      - Account Data
      summary: List digital blockchain withdrawals
      description: "Fetches the state of all digital blockchain withdrawal requests\
        \ that were submitted through either the API or UI. This endpoint belongs\
        \ to the [\"Query\"](#section/Introduction/Rate-Limiting) rate limiting category\
        \ and requires [\"Account Information\"](#section/Introduction/API-Key-Scopes)\
        \ scope. \n\nThis is a [\"paginated endpoint\"](#tag/Tutorials/Paginated-Results)."
      operationId: listWithdrawalRequests
      parameters:
      - name: page_size
        in: query
        description: Maximum number of records to be returned at once
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 1000
        example: 100
      - name: after
        in: query
        description: Fetch withdrawals after this cursor (more recent). This parameter
          is incompatible with `before`
        schema:
          type: string
        example: 34a1941f3bfab96973d5ea3e7ddbccf592d69de1678f64d2803dc80313aa
      - name: before
        in: query
        description: Fetch withdrawals before this cursor (earlier withdrawals). This
          parameter is incompatible with `after`
        schema:
          type: string
        example: 25a44cbdafca0ad99b966c79e58417faf1dbe1f3fb8c8466fb60e2ff2d02
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerWithdrawalRequestsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
components:
  schemas:
    AuthenticationRequest:
      required:
      - client_key_id
      - nonce
      - signature
      - timestamp
      type: object
      properties:
        client_key_id:
          type: string
          description: Api key Id
        timestamp:
          type: string
          description: ISO8601 timestamp with millisecond resolution - should be within
            30 seconds of the server time to be considered valid
          format: date-time
          example: 2021-09-12T08:00:00Z
        nonce:
          type: string
          description: The nonce is a random string and should be unique within a
            60-second window and is intended to prevent relay attacks.
        signature:
          type: string
          description: The signature for the authentication request
      description: Authentication Request
    Authenticated:
      type: object
      properties:
        token:
          type: string
          description: Session token to be used when making private api calls
          example: kERa3hugpPuNV9cYob3IJGclu1FAt9vySrZDiZbGBbyU0SxHXi6_5gByLQ9q_IVjL_4BhXxQxgRL5rjCeHQpwQ
      description: Successful authentication response
    ApiError:
      type: object
      properties:
        error_code:
          type: string
          description: Error code
          example: BAD_REQUEST
        error_message:
          type: string
          description: Error description
          example: Error message
      description: API error response
    TimeResponse:
      type: object
      properties:
        epoch_millis:
          type: string
          description: Epoch milliseconds
        timestamp:
          type: string
          description: ISO8601 timestamp with millisecond resolution
      description: Time
    CommodityInstrument:
      type: object
      allOf:
      - $ref: "#/components/schemas/Instrument"
    CurrencyFutureInstrument:
      type: object
      allOf:
      - $ref: "#/components/schemas/Instrument"
    CurrencyInstrument:
      type: object
      allOf:
      - $ref: "#/components/schemas/Instrument"
      - type: object
        properties:
          short_swap_points:
            type: string
            description: Short swap points
          long_swap_points:
            type: string
            description: Long swap points
          short_swap_cost:
            type: string
            description: Short swap cost represents the cost of funding a short position
              of Swap cost units between 'value_date_from' and 'value_date_to'
          long_swap_cost:
            type: string
            description: Long swap cost represents the cost of funding a long position
              of swap cost units between 'value_date_from' and 'value_date_to'
          swap_cost_units:
            type: string
            description: Swap cost units
          trade_date:
            type: string
            description: Trade date that the swap points relate to
          value_date_from:
            type: string
            description: Value Date for trade date
          value_date_to:
            type: string
            description: Value Date for next trade date
    EquityInstrument:
      type: object
      allOf:
      - $ref: "#/components/schemas/Instrument"
      - type: object
        properties:
          long_financing_rate:
            type: string
            description: Long financing rate (adjusted from funding base rate). Non-currencies
              only
          short_financing_rate:
            type: string
            description: Short financing rate (adjusted from funding base rate). Non-currencies
              only
          funding_base_rate:
            type: string
            description: Funding base rate
    IndexInstrument:
      type: object
      allOf:
      - $ref: "#/components/schemas/Instrument"
      - type: object
        properties:
          long_financing_rate:
            type: string
            description: Long financing rate (adjusted from funding base rate). Non-currencies
              only
          short_financing_rate:
            type: string
            description: Short financing rate (adjusted from funding base rate). Non-currencies
              only
          funding_base_rate:
            type: string
            description: Funding base rate
          long_financing_premium_rate:
            type: string
            description: "Long financing rate: base rate with long financing rate\
              \ premium. Indicies only."
          short_financing_premium_rate:
            type: string
            description: "Short financing rate: base rate with short financing rate\
              \ reduction. Indicies only."
    Instrument:
      type: object
      properties:
        instrument_id:
          type: string
          description: Instrument identifier
        security_id:
          type: string
          description: Exchange identifier for the instrument
          example: "4003"
        symbol:
          type: string
          description: Symbol of the underlying security
          example: EUR/GBP
        currency:
          type: string
          description: The unit you will pay in when ordering this instrument. The
            instrument price is measured in units of currency.
          example: GBP
        unit_of_measure:
          type: string
          description: The unit you will receive if you buy some of this instrument.
          example: EUR
        quantity_increment:
          type: string
          description: Quantity increment is the smallest amount you can buy or sell.
            It also specifies the minimum trade quantity.
          example: "0.1"
        margin:
          type: string
          description: Margin percentage
        minimum_position_size:
          type: string
          description: Minimum position size
        maximum_position_size:
          type: string
          description: Maximum position size
        trading_days:
          type: array
          description: Trading days
          items:
            type: string
            description: Trading days
            enum:
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
            - SATURDAY
            - SUNDAY
        open_time:
          type: string
          description: Session start time
        close_time:
          type: string
          description: Session end time
        time_zone:
          type: string
          description: Timezone Id
        minimum_commission:
          type: string
          description: Minimum commission
        aggressive_commission_per_unit_of_measure:
          type: string
          description: "Aggressive commission per unit of measure, if commission is\
            \ calculated per unit"
        passive_commission_per_unit_of_measure:
          type: string
          description: "Passive commission per unit of measure, if commission is calculated\
            \ per unit"
        aggressive_commission_rate:
          type: string
          description: 'Aggressive commission rate (in basis points). '
        passive_commission_rate:
          type: string
          description: 'Passive commission rate (in basis points). '
        price_increment:
          type: string
          description: Price increment is the smallest fraction of a price that can
            be specified for an order. Also known as the price 'tick'.
        minimum_price:
          type: string
          description: Minimum price for any order placed on this instrument
        maximum_price:
          type: string
          description: Maximum price for any order placed on this instrument
