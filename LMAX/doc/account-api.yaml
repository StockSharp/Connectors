openapi: 3.0.1
info:
  title: Account API
  description: LMAX Group Account API
  version: 1.4.2
  x-logo:
    altText: LMAX Group
    href: /
    url: lmax.group.logo.png
servers:
- url: https://account-api.london-professional.lmax.com
- url: https://account-api.london-digital.lmax.com
- url: https://account-api.newyork-professional.lmax.com
- url: https://account-api.tokyo-professional.lmax.com
- url: https://account-api.singapore-professional.lmax.com
- url: https://account-api.london-demo.lmax.com
- url: https://account-api.london-uat.lmax.com
- url: https://account-api.digital-uat.lmax.com
tags:
- name: Authentication
- name: Account Data
- name: Account Maintenance
- name: Trading
- name: Public Data
- name: Web Sockets
- name: Tutorials
- name: Rejection Reasons
paths:
  /v1/authenticate:
    post:
      tags:
      - Authentication
      summary: Authentication Endpoint
      description: "Authenticate to use private APIs. On successful authentication,\
        \ a session token is returned that should be used in subsequent private api\
        \ calls. This endpoint belongs to the [\"authentication\"](#section/Introduction/Rate-Limiting)\
        \ rate limiting category."
      operationId: authenticate
      requestBody:
        description: Authentication request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticationRequest"
        required: true
      responses:
        "200":
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Authenticated"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/logout:
    post:
      tags:
      - Authentication
      summary: Logout Endpoint
      description: "Invalidate the token used to call this endpoint. This endpoint\
        \ belongs to the [\"authentication\"](#section/Introduction/Rate-Limiting)\
        \ rate limiting category."
      operationId: logout
      responses:
        "204":
          description: Successfully logged out
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/heartbeat:
    get:
      tags:
      - Authentication
      summary: Heartbeat
      description: "Prevent session token from expiry. This endpoint belongs to the\
        \ [\"authentication\"](#section/Introduction/Rate-Limiting) rate limiting\
        \ category."
      operationId: heartbeat
      responses:
        "204":
          description: Success
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/time:
    get:
      tags:
      - Public Data
      summary: Current time
      description: Get current time.
      operationId: getTime
      responses:
        "200":
          description: Current time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeResponse"
  /v1/account/instrument-data:
    get:
      tags:
      - Account Data
      summary: Instrument data
      description: "Fetch instrument data including funding, commission, margin rates,\
        \ account position limits. This endpoint belongs to the [\"query\"](#section/Introduction/Rate-Limiting)\
        \ rate limiting category and requires [\"Account Information\"](#section/Introduction/API-Key-Scopes)\
        \ scope."
      operationId: getInstrumentData
      responses:
        "200":
          description: Instrument data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentDataResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/order-state:
    get:
      tags:
      - Account Data
      summary: Order state
      description: "Fetch an order state from the last seven days. The order can be\
        \ queried by either URL-encoded 'Order Id' or the combination of URL-encoded\
        \ 'Instruction Id' and 'Instrument Id'. This endpoint belongs to the [\"Account\"\
        ](#section/Introduction/Rate-Limiting) rate limiting category and requires\
        \ [\"Account Information\"](#section/Introduction/API-Key-Scopes) scope."
      operationId: getOrderState
      parameters:
      - name: instruction_id
        in: query
        description: "Instruction Id, may contain RFC3986 reserved characters and\
          \ should be URL encoded."
        schema:
          maxLength: 20
          type: string
        example: instruction-1254
      - name: order_id
        in: query
        description: "Order Id, may contain RFC3986 reserved characters and should\
          \ be URL encoded."
        schema:
          type: string
        example: VkZgzAAAAAJUC%2BQB
      - name: instrument_id
        in: query
        description: Instrument Id
        schema:
          type: string
        example: eur-usd
      responses:
        "200":
          description: Order state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStateResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/working-orders:
    get:
      tags:
      - Account Data
      summary: Working orders
      description: |-
        Fetch all unfilled orders for this account. This endpoint belongs to the ["Account"](#section/Introduction/Rate-Limiting) rate limiting category and requires ["Account Information"](#section/Introduction/API-Key-Scopes) scope.

        This is a ["paginated endpoint"](#tag/Tutorials/Paginated-Results).
      operationId: getWorkingOrders
      parameters:
      - name: page_size
        in: query
        description: Maximum number of orders to be included into the response
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 1000
        example: 100
      - name: after
        in: query
        description: Fetch orders after this cursor (more recent). This parameter
          is incompatible with `before`
        schema:
          type: string
        example: 34a1941f3bfab96973d5ea3e7ddbccf592d69de1678f64d2803dc80313aa
      - name: before
        in: query
        description: Fetch orders before this cursor (earlier orders). This parameter
          is incompatible with `after`
        schema:
          type: string
        example: 25a44cbdafca0ad99b966c79e58417faf1dbe1f3fb8c8466fb60e2ff2d02
      responses:
        "200":
          description: Current working orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkingOrdersResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/order-positions:
    get:
      tags:
      - Account Data
      summary: Order positions
      description: |-
        Fetch order positions. This endpoint belongs to the ["Account"](#section/Introduction/Rate-Limiting) rate limiting category and requires ["Account Information"](#section/Introduction/API-Key-Scopes) scope.

        This is a ["paginated endpoint"](#tag/Tutorials/Paginated-Results).
      operationId: getOrderPositions
      parameters:
      - name: page_size
        in: query
        description: Maximum number of orders to be included into the response
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 1000
        example: 100
      - name: after
        in: query
        description: Fetch orders after this cursor (more recent). This parameter
          is incompatible with `before`
        schema:
          type: string
        example: 34a1941f3bfab96973d5ea3e7ddbccf592d69de1678f64d2803dc80313aa
      - name: before
        in: query
        description: Fetch orders before this cursor (earlier orders). This parameter
          is incompatible with `after`
        schema:
          type: string
        example: 25a44cbdafca0ad99b966c79e58417faf1dbe1f3fb8c8466fb60e2ff2d02
      responses:
        "200":
          description: Order positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPositionsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/positions:
    get:
      tags:
      - Account Data
      summary: Instrument positions
      description: "Fetch current open positions aggregated at the instrument level.\
        \ This endpoint belongs to the [\"Account\"](#section/Introduction/Rate-Limiting)\
        \ rate limiting category and requires [\"Account Information\"](#section/Introduction/API-Key-Scopes)\
        \ scope."
      operationId: getInstrumentPositions
      responses:
        "200":
          description: Current open positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentPositionsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/wallets:
    get:
      tags:
      - Account Data
      summary: Wallet balances
      description: "Fetch account wallet balances. This endpoint belongs to the [\"\
        Account\"](#section/Introduction/Rate-Limiting) rate limiting category and\
        \ requires [\"Account Information\"](#section/Introduction/API-Key-Scopes)\
        \ scope."
      operationId: getWalletBalances
      responses:
        "200":
          description: Current wallet balances
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/WalletBalancesWithoutCollateralizedCurrencyLimitResponse"
                - $ref: "#/components/schemas/WalletBalancesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/collateralized-credit:
    get:
      tags:
      - Account Data
      summary: Collateralized credit
      description: "Total collateralized credit and how much has been used. Note that\
        \ not all accounts support collateralized credit. Calling this endpoint for\
        \ an unsupported account returns a not supported response. This endpoint belongs\
        \ to the [\"Account\"](#section/Introduction/Rate-Limiting) rate limiting\
        \ category and requires [\"Account Information\"](#section/Introduction/API-Key-Scopes)\
        \ scope."
      operationId: getCollateralizedCredit
      responses:
        "200":
          description: Collateralized credit
          content:
            application/json:
              schema:
                anyOf:
                - $ref: "#/components/schemas/CollateralizedCreditResponse"
                - $ref: "#/components/schemas/CollateralizedCreditNotSupportedResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/account-transactions:
    get:
      tags:
      - Account Data
      summary: Transactions
      description: |-
        Fetch account transactions. This endpoint belongs to the ["Query"](#section/Introduction/Rate-Limiting) rate limiting category and requires ["Account Information"](#section/Introduction/API-Key-Scopes) scope.

        This is a ["paginated endpoint"](#tag/Tutorials/Paginated-Results).
      operationId: getAccountTransactions
      parameters:
      - name: start_time
        in: query
        schema:
          type: string
          format: date-time
        examples:
          milliseconds:
            description: ISO8601 timestamp with millisecond resolution
            value: 2021-09-11T08:00:00.000Z
          seconds:
            description: ISO8601 timestamp with second resolution
            value: 2021-09-11T08:00:00Z
      - name: end_time
        in: query
        schema:
          type: string
          format: date-time
        examples:
          milliseconds:
            description: ISO8601 timestamp with millisecond resolution
            value: 2021-09-12T08:00:00.000Z
          seconds:
            description: ISO8601 timestamp with second resolution
            value: 2021-09-12T08:00:00Z
      - name: page_size
        in: query
        description: Maximum number of transactions to be included into the response
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 1000
        example: 100
      - name: after
        in: query
        description: Fetch transactions after this cursor (more recent). This parameter
          is incompatible with `before`
        schema:
          type: string
        example: 34a1941f3bfab96973d5ea3e7ddbccf592d69de1678f64d2803dc80313aa
      - name: before
        in: query
        description: Fetch transactions before this cursor (earlier orders). This
          parameter is incompatible with `after`
        schema:
          type: string
        example: 25a44cbdafca0ad99b966c79e58417faf1dbe1f3fb8c8466fb60e2ff2d02
      - name: transaction_categories
        in: query
        description: "Filter transactions by category, allowed values are: <span class=\"\
          enum\">\"BANK_TRANSFER_CURRENCY_CONVERSION\"</span>, <span class=\"enum\"\
          >\"BASE_CURRENCY_SWEEP\"</span>, <span class=\"enum\">\"COMMISSION\"</span>,\
          \ <span class=\"enum\">\"COMMISSION_REVENUE\"</span>, <span class=\"enum\"\
          >\"DEBIT_CREDIT\"</span>, <span class=\"enum\">\"DELIVERABLE\"</span>, <span\
          \ class=\"enum\">\"DIVIDEND\"</span>, <span class=\"enum\">\"EXECUTION\"\
          </span>, <span class=\"enum\">\"FOREIGN_CURRENCY_SWEEP\"</span>, <span class=\"\
          enum\">\"FUNDING\"</span>, <span class=\"enum\">\"FX_FUNDING\"</span>, <span\
          \ class=\"enum\">\"MARK_TO_MARKET_PROFIT_LOSS\"</span>"
        schema:
          type: string
        example: "DEBIT_CREDIT,COMMISSION"
      responses:
        "200":
          description: Account transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountTransactionResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/trades:
    get:
      tags:
      - Account Data
      summary: Trade history
      description: |-
        Fetch account trades. When requesting before or after trades only one query parameter is allowed (before or after). This endpoint belongs to the ["Query"](#section/Introduction/Rate-Limiting) rate limiting category and requires ["Account Information"](#section/Introduction/API-Key-Scopes) scope.

        This is a ["paginated endpoint"](#tag/Tutorials/Paginated-Results).
      operationId: getTradeHistory
      parameters:
      - name: order_information
        in: query
        description: Whether to include order information in the response
        schema:
          type: boolean
          default: false
        example: true
      - name: start_time
        in: query
        schema:
          type: string
          format: date-time
        examples:
          milliseconds:
            description: ISO8601 timestamp with millisecond resolution
            value: 2021-09-11T08:00:00.000Z
          seconds:
            description: ISO8601 timestamp with second resolution
            value: 2021-09-11T08:00:00Z
      - name: end_time
        in: query
        schema:
          type: string
          format: date-time
        examples:
          milliseconds:
            description: ISO8601 timestamp with millisecond resolution
            value: 2021-09-12T08:00:00.000Z
          seconds:
            description: ISO8601 timestamp with second resolution
            value: 2021-09-12T08:00:00Z
      - name: page_size
        in: query
        description: Maximum number of records to be returned at once
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 1000
        example: 100
      - name: after
        in: query
        description: Fetch trades after this cursor (more recent). This parameter
          is incompatible with `before`
        schema:
          type: string
        example: 34a1941f3bfab96973d5ea3e7ddbccf592d69de1678f64d2803dc80313aa
      - name: before
        in: query
        description: Fetch trades before this cursor (earlier trades). This parameter
          is incompatible with `after`
        schema:
          type: string
        example: 25a44cbdafca0ad99b966c79e58417faf1dbe1f3fb8c8466fb60e2ff2d02
      responses:
        "200":
          description: Successfully fetched trade history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeHistoryResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/place-order:
    post:
      tags:
      - Trading
      summary: Place order
      description: "Place order for this account. This endpoint belongs to the [\"\
        Trading\"](#section/Introduction/Rate-Limiting) rate limiting category and\
        \ requires [\"Trading\"](#section/Introduction/API-Key-Scopes) scope."
      operationId: placeOrder
      requestBody:
        description: Place order request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
        required: true
      responses:
        "200":
          description: Place order response
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/PlaceOrderResponse"
                - $ref: "#/components/schemas/PlaceOrderRejectionResponse"
        "400":
          description: Place order bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceOrderBadRequestResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The service is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - Bearer: []
  /v1/account/cancel-order:
    post:
      tags:
      - Trading
      summary: Cancel order
      description: "Cancel order for this account. This endpoint belongs to the [\"\
        Trading\"](#section/Introduction/Rate-Limiting) rate limiting category and\
        \ requires [\"Trading\"](#section/Introduction/API-Key-Scopes) scope."
      operationId: cancelOrder
      requestBody:
        description: Cancel order request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
        required: true
      responses:
        "200":
          description: Cancel order response
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/CancelOrderResponse"
                - $ref: "#/components/schemas/CancelOrderRejectionResponse"
        "400":
