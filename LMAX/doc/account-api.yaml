    PlaceOrderRequest:
      required:
      - instruction_id
      - instrument_id
      - quantity
      - side
      - time_in_force
      - type
      type: object
      properties:
        instrument_id:
          type: string
          description: Instrument identifier
        type:
          type: string
          description: Order type
          enum:
          - MARKET
          - LIMIT
          - STOP
          - STOP_LIMIT
        side:
          type: string
          description: The side of the order. Bid is a buy. Ask is a sell
          enum:
          - BID
          - ASK
        quantity:
          type: string
          description: "Quantity in base currency or other unit of measure (e.g. barrels,\
            \ troy oz)"
        price:
          type: string
          description: Limit price. Required for <span class="enum">"LIMIT"</span>
            and <span class="enum">"STOP_LIMIT"</span> orders
        stop_price:
          type: string
          description: Stop price. Required for <span class="enum">"STOP"</span> and
            <span class="enum">"STOP_LIMIT"</span> orders
        trigger_method:
          type: string
          description: The method to trigger a <span class="enum">"STOP"</span> or
            <span class="enum">"STOP_LIMIT"</span> order and stop loss contingent
            orders.<ul><li><span class="enum">"ONE_TOUCH"</span> <span class="enum">"ASK"</span>
            orders trigger when the best bid price moves down to the stop_price (or
            below)</li><li><span class="enum">"ONE_TOUCH"</span> <span class="enum">"BID"</span>
            orders trigger when the best ask price moves up to the stop_price (or
            above)</li><li><span class="enum">"BID_OFFER"</span> <span class="enum">"ASK"</span>
            orders trigger when the best ask price moves down to the stop_price (or
            below)</li><li><span class="enum">"BID_OFFER"</span> <span class="enum">"BID"</span>
            orders trigger when the best bid price moves up to the stop_price (or
            above)</li></ul>
          enum:
          - ONE_TOUCH
          - BID_OFFER
        instruction_id:
          maxLength: 20
          type: string
          description: "An identifier for this request. Use ASCII characters from\
            \ 33 to 126. Cannot be \"0\". Certain ASCII sequences (for example, “\
            ${“) may represent heuristic patterns of interest and result in LMAX security\
            \ systems blocking requests until triage, it is recommended that these\
            \ be avoided if possible"
        time_in_force:
          type: string
          description: "Time in force of the order.<ul><li><span class=\"enum\">\"\
            FILL_OR_KILL\"</span> The order must totally fill or it is cancelled.\
            \ Applicable to <span class=\"enum\">\"LIMIT\"</span>, <span class=\"\
            enum\">\"MARKET\"</span> orders.</li><li><span class=\"enum\">\"IMMEDIATE_OR_CANCEL\"\
            </span> The order can either totally or partially fill, any remainder\
            \ is cancelled. Applicable to <span class=\"enum\">\"LIMIT\"</span>, <span\
            \ class=\"enum\">\"MARKET\"</span> orders.</li><li><span class=\"enum\"\
            >\"GOOD_FOR_DAY\"</span> The order will try to fill what it can immediately,\
            \ any remaining will rest on the orderbook. It will be cancelled at the\
            \ end of the trading day.Applicable to <span class=\"enum\">\"LIMIT\"\
            </span>, <span class=\"enum\">\"STOP\"</span>, <span class=\"enum\">\"\
            STOP_LIMIT\"</span> orders.</li><li><span class=\"enum\">\"GOOD_TIL_CANCELLED\"\
            </span> The order will try to fill what it can immediately, any remaining\
            \ will rest on the orderbook. It will not cancel at the end of trading\
            \ day and will be placed the next day (and so on until you cancel it specifically).\
            \ Applicable to <span class=\"enum\">\"LIMIT\"</span>, <span class=\"\
            enum\">\"STOP\"</span>, <span class=\"enum\">\"STOP_LIMIT\"</span> orders.</li></ul>"
          enum:
          - FILL_OR_KILL
          - IMMEDIATE_OR_CANCEL
          - GOOD_FOR_DAY
          - GOOD_TIL_CANCELLED
        take_profit_offset:
          type: string
          description: Stop offset from contingent order reference price; required
            when setting a take profit contingent order
        take_profit_instruction_id:
          maxLength: 20
          type: string
          description: "An identifier for this request's take profit order. Use ASCII\
            \ characters from 33 to 126. Cannot be \"0\"; required when setting a\
            \ take profit contingent order. Note: certain ASCII sequences (for example,\
            \ “${“) may represent heuristic patterns of interest and result in LMAX\
            \ security systems blocking requests until triage, it is recommended that\
            \ these be avoided if possible"
        stop_loss_offset:
